<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fam Properties — Document Checker</title>
<style>
  :root {
    --primary: #1a1a2e;
    --accent: #e94560;
    --accent-light: #ff6b81;
    --bg: #f8f9fa;
    --card: #ffffff;
    --text: #2d3436;
    --muted: #636e72;
    --success: #00b894;
    --warning: #fdcb6e;
    --danger: #d63031;
    --border: #dfe6e9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  header {
    background: var(--primary);
    color: white;
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header h1 {
    font-size: 1.4rem;
    font-weight: 600;
  }

  header h1 span {
    color: var(--accent);
  }

  .badge {
    background: var(--accent);
    color: white;
    padding: 0.25rem 0.75rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
  }

  .badge.green { background: var(--success); }

  .container {
    max-width: 960px;
    margin: 2rem auto;
    padding: 0 1.5rem;
  }

  .card {
    background: var(--card);
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    padding: 2rem;
    margin-bottom: 1.5rem;
  }

  .card h2 {
    font-size: 1.15rem;
    margin-bottom: 1.25rem;
    color: var(--primary);
  }

  label {
    display: block;
    font-weight: 600;
    font-size: 0.85rem;
    margin-bottom: 0.35rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  select, input[type="text"], input[type="email"] {
    width: 100%;
    padding: 0.65rem 0.85rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.95rem;
    margin-bottom: 1rem;
    transition: border 0.2s;
  }

  select:focus, input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    margin-bottom: 1rem;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.active {
    border-color: var(--accent);
    background: rgba(233, 69, 96, 0.03);
  }

  .drop-zone p {
    color: var(--muted);
    margin-top: 0.5rem;
    font-size: 0.9rem;
  }

  .drop-zone .icon {
    font-size: 2.5rem;
    color: var(--accent);
  }

  #file-list {
    list-style: none;
    margin-bottom: 1rem;
  }

  #file-list li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.5rem 0.75rem;
    background: var(--bg);
    border-radius: 6px;
    margin-bottom: 0.35rem;
    font-size: 0.88rem;
  }

  #file-list li .remove {
    color: var(--danger);
    cursor: pointer;
    font-weight: 700;
  }

  button.primary {
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.85rem 2rem;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
  }

  button.primary:hover { background: var(--accent-light); }
  button.primary:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
  }

  #loading {
    display: none;
    text-align: center;
    padding: 3rem 1rem;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  #results { display: none; }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }

  .result-header h2 { margin-bottom: 0; }

  .status-chip {
    padding: 0.35rem 1rem;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  .status-chip.approved { background: #d4edda; color: #155724; }
  .status-chip.pending  { background: #fff3cd; color: #856404; }

  .meter-bar {
    height: 10px;
    background: var(--border);
    border-radius: 5px;
    overflow: hidden;
    margin: 0.75rem 0 0.35rem;
  }

  .meter-bar .fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.6s ease;
  }

  .meter-label {
    font-size: 0.82rem;
    color: var(--muted);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }

  th {
    text-align: left;
    padding: 0.6rem 0.75rem;
    border-bottom: 2px solid var(--border);
    color: var(--muted);
    font-size: 0.78rem;
    text-transform: uppercase;
  }

  td {
    padding: 0.55rem 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .tag {
    display: inline-block;
    padding: 0.15rem 0.55rem;
    border-radius: 4px;
    font-size: 0.78rem;
    font-weight: 600;
  }

  .tag.ok { background: #d4edda; color: #155724; }
  .tag.warn { background: #fff3cd; color: #856404; }
  .tag.err { background: #f8d7da; color: #721c24; }
  .tag.miss { background: #e2e3e5; color: #383d41; }

  .missing-list {
    list-style: none;
    padding: 0;
  }

  .missing-list li {
    padding: 0.6rem 0.75rem;
    border-left: 3px solid var(--danger);
    background: #ffeef0;
    margin-bottom: 0.4rem;
    border-radius: 0 6px 6px 0;
    font-size: 0.9rem;
  }

  .missing-list li small {
    display: block;
    color: var(--muted);
    font-size: 0.78rem;
  }

  .claude-box {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: white;
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
  }

  .claude-box h3 {
    font-size: 0.95rem;
    margin-bottom: 0.75rem;
    opacity: 0.9;
  }

  .claude-box .verdict {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .claude-box ul {
    margin-left: 1.25rem;
    font-size: 0.88rem;
    opacity: 0.9;
  }

  .claude-box ul li { margin-bottom: 0.3rem; }

  footer {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 0.82rem;
  }

  @media (max-width: 600px) {
    .row { grid-template-columns: 1fr; }
    header { flex-direction: column; gap: 0.5rem; }
  }
</style>
</head>
<body>

<header>
  <h1><span>fam</span> Properties &mdash; Document Checker</h1>
  <span class="badge" id="api-badge">Loading...</span>
</header>

<div class="container">
  <!-- FORM -->
  <div id="form-section">
    <div class="card">
      <h2>Submit Documents for Review</h2>

      <label>Transaction Type</label>
      <select id="txType">
        <option value="">-- Select --</option>
        <option value="residential_sale">Residential Sale</option>
        <option value="residential_rent">Residential Rent</option>
        <option value="commercial_sale">Commercial Sale</option>
        <option value="off_plan_sale">Off-Plan Sale</option>
      </select>

      <div id="req-preview" style="display:none; margin-bottom:1.25rem;"></div>

      <div class="row">
        <div>
          <label>Broker Name</label>
          <input type="text" id="brokerName" placeholder="e.g. Khalid Hassan">
        </div>
        <div>
          <label>Broker Email</label>
          <input type="email" id="brokerEmail" placeholder="e.g. khalid@agency.ae">
        </div>
      </div>

      <label>Property Reference</label>
      <input type="text" id="propertyRef" placeholder="e.g. Marina Heights - Unit 1204">
    </div>

    <div class="card">
      <h2>Upload Documents</h2>

      <div class="drop-zone" id="dropZone">
        <div class="icon">&#128196;</div>
        <p>Drag &amp; drop files here, or <strong>click to browse</strong></p>
        <p style="font-size:0.78rem;">PDF, JPG, PNG, DOCX &mdash; max 25 MB each</p>
        <input type="file" id="fileInput" multiple accept=".pdf,.jpg,.jpeg,.png,.docx,.doc,.tiff" style="display:none;">
      </div>

      <ul id="file-list"></ul>

      <button class="primary" id="submitBtn" disabled>Check Documents</button>
    </div>
  </div>

  <!-- LOADING -->
  <div id="loading">
    <div class="spinner"></div>
    <p style="color:var(--muted);">Analyzing your documents...</p>
  </div>

  <!-- RESULTS -->
  <div id="results"></div>
</div>

<footer>
  fam Properties &copy; 2026 &mdash; Document Checker Agent v1.0
</footer>

<script>
const API = '';  // same origin

// Health check
fetch(`${API}/api/health`).then(r => r.json()).then(d => {
  const b = document.getElementById('api-badge');
  b.textContent = d.claude_enabled ? 'AI Enabled' : 'Rule-Based';
  b.className = 'badge' + (d.claude_enabled ? ' green' : '');
}).catch(() => {
  document.getElementById('api-badge').textContent = 'Offline';
});

// Requirements preview
let txTypes = {};
fetch(`${API}/api/transaction-types`).then(r => r.json()).then(d => { txTypes = d; });

document.getElementById('txType').addEventListener('change', function() {
  const preview = document.getElementById('req-preview');
  const t = txTypes[this.value];
  if (!t) { preview.style.display = 'none'; return; }
  preview.style.display = 'block';
  preview.innerHTML = `<p style="font-size:0.85rem; color:var(--muted); margin-bottom:0.5rem;">
    <strong>${t.label}</strong> requires <strong>${t.required_count}</strong> documents
    (+ ${t.optional_count} optional):</p>
    <div style="font-size:0.82rem; color:var(--muted); columns:2; column-gap:1rem;">`
    + t.required.map(d => `<div style="margin-bottom:0.25rem;">&#8226; ${d.name}</div>`).join('')
    + `</div>`;
});

// File handling
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('file-list');
const submitBtn = document.getElementById('submitBtn');
let selectedFiles = [];

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('active'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('active'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('active');
  addFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => addFiles(fileInput.files));

function addFiles(files) {
  for (const f of files) {
    if (!selectedFiles.find(x => x.name === f.name)) selectedFiles.push(f);
  }
  renderFiles();
}

function renderFiles() {
  fileList.innerHTML = '';
  selectedFiles.forEach((f, i) => {
    const li = document.createElement('li');
    const size = (f.size / 1024 / 1024).toFixed(2);
    li.innerHTML = `<span>${f.name} <small style="color:var(--muted)">(${size} MB)</small></span>
      <span class="remove" data-idx="${i}">&times;</span>`;
    fileList.appendChild(li);
  });
  submitBtn.disabled = selectedFiles.length === 0 || !document.getElementById('txType').value;
  document.querySelectorAll('.remove').forEach(el => {
    el.addEventListener('click', function() {
      selectedFiles.splice(+this.dataset.idx, 1);
      renderFiles();
    });
  });
}

document.getElementById('txType').addEventListener('change', () => {
  submitBtn.disabled = selectedFiles.length === 0 || !document.getElementById('txType').value;
});

// Submit
submitBtn.addEventListener('click', async () => {
  const txType = document.getElementById('txType').value;
  if (!txType || selectedFiles.length === 0) return;

  const fd = new FormData();
  fd.append('transaction_type', txType);
  fd.append('broker_name', document.getElementById('brokerName').value || 'Broker');
  fd.append('broker_email', document.getElementById('brokerEmail').value || 'broker@agency.ae');
  fd.append('property_ref', document.getElementById('propertyRef').value || '');
  selectedFiles.forEach(f => fd.append('files', f));

  document.getElementById('form-section').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  try {
    const res = await fetch(`${API}/api/check`, { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Check failed');
    renderResults(data);
  } catch (err) {
    alert('Error: ' + err.message);
    document.getElementById('form-section').style.display = 'block';
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
});

function renderResults(d) {
  const el = document.getElementById('results');
  el.style.display = 'block';

  const pct = d.completeness_pct;
  const barColor = pct === 100 ? 'var(--success)' : pct >= 70 ? 'var(--warning)' : 'var(--danger)';
  const statusClass = d.status === 'approved' ? 'approved' : 'pending';

  let html = `
    <div class="card">
      <div class="result-header">
        <h2>Results &mdash; ${d.submission_id}</h2>
        <span class="status-chip ${statusClass}">${d.approval_label}</span>
      </div>
      <p style="font-size:0.88rem; color:var(--muted); margin-bottom:0.5rem;">
        ${d.transaction_label} &bull; ${d.broker.name} &bull; ${d.property_ref || 'N/A'}
      </p>

      <div style="margin:1rem 0;">
        <strong style="font-size:1.5rem;">${pct}%</strong>
        <span style="color:var(--muted); font-size:0.88rem;"> complete</span>
        <div class="meter-bar"><div class="fill" style="width:${pct}%; background:${barColor};"></div></div>
        <span class="meter-label">${d.present_documents.length} of ${d.present_documents.length + d.missing_documents.length} required documents</span>
      </div>
    </div>

    <div class="card">
      <h2>Document Classification</h2>
      <table>
        <thead><tr><th>File</th><th>Classified As</th><th>Confidence</th><th>Status</th></tr></thead>
        <tbody>`;

  d.file_results.forEach(f => {
    const tag = f.classified_as
      ? (f.confidence >= 0.6 ? '<span class="tag ok">OK</span>' : '<span class="tag warn">Low Conf.</span>')
      : '<span class="tag err">Unclassified</span>';
    const issues = f.issues.length
      ? `<br><small style="color:var(--danger);">${f.issues.map(i=>i.message).join('; ')}</small>` : '';
    html += `<tr>
      <td>${f.file_name}${issues}</td>
      <td>${f.classified_label || '&mdash;'}</td>
      <td>${(f.confidence * 100).toFixed(0)}%</td>
      <td>${tag}</td>
    </tr>`;
  });

  html += `</tbody></table></div>`;

  if (d.missing_documents.length > 0) {
    html += `<div class="card">
      <h2>Missing Documents (${d.missing_documents.length})</h2>
      <ul class="missing-list">`;
    d.missing_documents.forEach(m => {
      html += `<li><strong>${m.name}</strong><small>${m.description}</small></li>`;
    });
    html += `</ul></div>`;
  }

  if (d.claude_analysis && !d.claude_analysis.error) {
    const ca = d.claude_analysis;
    html += `<div class="card">
      <div class="claude-box">
        <h3>Claude AI Analysis</h3>
        <div class="verdict">${ca.verdict || 'N/A'} &bull; Risk: ${ca.risk || 'N/A'}</div>`;
    if (ca.recommendations && ca.recommendations.length) {
      html += `<ul>` + ca.recommendations.map(r => `<li>${r}</li>`).join('') + `</ul>`;
    }
    if (ca.red_flags && ca.red_flags.length) {
      html += `<p style="margin-top:0.75rem; font-weight:600;">Red Flags:</p>
        <ul>` + ca.red_flags.map(r => `<li>${r}</li>`).join('') + `</ul>`;
    }
    html += `</div></div>`;
  }

  html += `<div style="text-align:center; margin:1.5rem 0;">
    <button class="primary" style="max-width:300px;" onclick="location.reload()">Check Another Submission</button>
  </div>`;

  el.innerHTML = html;
}
</script>
</body>
</html>
